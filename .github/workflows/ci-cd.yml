name: CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install flake8
      - name: Run Flake8
        run: flake8 app/ tests/
      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: 'deploy'
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r app/requirements.txt
      - name: Run Pytest with Coverage
        run: pytest --cov=app --cov-report=xml --cov-fail-under=40 tests/
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
  build-and-push:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,enable={{is_default_branch}},prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
  deploy-and-verify:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Target Node
        env:
          TARGET_IP: ${{ secrets.TARGET_IP }}
          TARGET_USER: ${{ secrets.TARGET_USER }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          ssh -o StrictHostKeyChecking=no $TARGET_USER@$TARGET_IP "echo 'IMAGE_TAG=$TAG' > /opt/mywebapp/.env"
          ssh -o StrictHostKeyChecking=no $TARGET_USER@$TARGET_IP "echo 'GH_USER=${{ github.actor }}' >> /opt/mywebapp/.env"
          scp -o StrictHostKeyChecking=no deploy/mywebapp-docker.service $TARGET_USER@$TARGET_IP:/tmp/
          scp -o StrictHostKeyChecking=no deploy/verify.sh $TARGET_USER@$TARGET_IP:/tmp/
          ssh -o StrictHostKeyChecking=no $TARGET_USER@$TARGET_IP "sudo cp /tmp/mywebapp-docker.service /etc/systemd/system/ && sudo systemctl daemon-reload && sudo systemctl enable mywebapp-docker && sudo systemctl restart mywebapp-docker"
      - name: Run Verification
        env:
          TARGET_IP: ${{ secrets.TARGET_IP }}
          TARGET_USER: ${{ secrets.TARGET_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no $TARGET_USER@$TARGET_IP "chmod +x /tmp/verify.sh && /tmp/verify.sh"